name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build & zip extension
        run: npm run zip
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: Create GitHub Release
        run: |
          ZIP=$(ls .output/*.zip | head -1)
          gh release create "$TAG" "$ZIP" \
            --title "Release $TAG" \
            --generate-notes
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
